<!-- @dsCard group="Brand" viewport="700x160" name="Wordmark" subtitle="The PlayStadium.io hero mark in Slight Chance — on carbon and on white" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-body); display: flex; }
  .panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; height: 160px; }
  .panel.alt { background: #ffffff; }
  .cap { font-family: var(--font-label); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); }
  .alt .cap { color: rgba(20,23,28,0.45); }
  .hero { font-family: var(--font-display); font-size: 36px; color: var(--text); line-height: 1; }
  .hero .dot { color: var(--gold); margin: 0 1px; }
  .alt .hero { color: var(--on-gold); }
  .alt .hero .dot { color: var(--gold); }
</style>
</head>
<body>
  <div class="panel">
    <span class="hero">PlayStadium<span class="dot">.</span>io</span>
    <span class="cap">Hero mark · Slight Chance</span>
  </div>
  <div class="panel alt">
    <span class="hero">PlayStadium<span class="dot">.</span>io</span>
    <span class="cap">On white</span>
  </div>
</body>
</html>
