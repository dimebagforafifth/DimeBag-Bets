<!-- @dsCard group="Brand" viewport="700x320" name="Game Icons — 3D" subtitle="21 transparent Higgsfield renders, glossy + vivid on the graphite tile" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-body); padding: 18px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .tile { aspect-ratio: 1; border-radius: var(--radius); border: 1px solid var(--line); box-shadow: var(--elev-1), var(--sheen);
    background: radial-gradient(125% 100% at 50% 0%, color-mix(in srgb, var(--gold) 22%, var(--surface-2)) 0%, var(--surface-2) 72%);
    display: flex; align-items: center; justify-content: center; }
  .tile img { width: 74%; height: 74%; object-fit: contain; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.45)); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><img src="../assets/game-icons/mines.png" alt="Mines" /></div>
    <div class="tile"><img src="../assets/game-icons/crash.png" alt="Crash" /></div>
    <div class="tile"><img src="../assets/game-icons/dice.png" alt="Dice" /></div>
    <div class="tile"><img src="../assets/game-icons/plinko.png" alt="Plinko" /></div>
    <div class="tile"><img src="../assets/game-icons/limbo.png" alt="Limbo" /></div>
    <div class="tile"><img src="../assets/game-icons/keno.png" alt="Keno" /></div>
    <div class="tile"><img src="../assets/game-icons/wheel.png" alt="Wheel" /></div>
    <div class="tile"><img src="../assets/game-icons/hilo.png" alt="Hi-Lo" /></div>
    <div class="tile"><img src="../assets/game-icons/dragon-tower.png" alt="Dragon Tower" /></div>
    <div class="tile"><img src="../assets/game-icons/pump.png" alt="Pump" /></div>
    <div class="tile"><img src="../assets/game-icons/blackjack.png" alt="Blackjack" /></div>
    <div class="tile"><img src="../assets/game-icons/roulette.png" alt="Roulette" /></div>
    <div class="tile"><img src="../assets/game-icons/baccarat.png" alt="Baccarat" /></div>
    <div class="tile"><img src="../assets/game-icons/cases.png" alt="Cases" /></div>
    <div class="tile"><img src="../assets/game-icons/chickenroad.png" alt="Chicken Road" /></div>
    <div class="tile"><img src="../assets/game-icons/coinflip.png" alt="Coin Flip" /></div>
    <div class="tile"><img src="../assets/game-icons/diamonds.png" alt="Diamonds" /></div>
    <div class="tile"><img src="../assets/game-icons/sicbo.png" alt="Sic Bo" /></div>
    <div class="tile"><img src="../assets/game-icons/slots.png" alt="Slots" /></div>
    <div class="tile"><img src="../assets/game-icons/threecardpoker.png" alt="Three Card Poker" /></div>
    <div class="tile"><img src="../assets/game-icons/videopoker.png" alt="Video Poker" /></div>
  </div>
</body>
</html>
