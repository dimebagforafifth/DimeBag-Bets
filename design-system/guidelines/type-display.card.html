<!-- @dsCard group="Type" viewport="700x180" name="Display & Scoreboard" subtitle="Slight Chance hero, Slight Chance Mono ticker, ECWC LED board" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-body); color: var(--text); padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .role { font-family: var(--font-label); font-size: 10px; font-weight: 600; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--faint); }
</style>
</head>
<body>
  <div>
    <div class="role">Slight Chance · hero display</div>
    <div style="font-family: var(--font-display); font-size: 46px; color: var(--gold-bright); line-height: 1;">Stadium · take a seat</div>
  </div>
  <div style="display:flex; gap:40px; align-items:flex-end;">
    <div>
      <div class="role">Slight Chance Mono · live ticker</div>
      <div style="font-family: var(--font-num); font-size: 26px; color: var(--gem);">CRASH 02:14 · 14.7×</div>
    </div>
    <div>
      <div class="role">ECWC Standard · scoreboard</div>
      <div style="font-family: var(--font-scoreboard); font-size: 26px; color: var(--gold);">STADIUM 24·7</div>
    </div>
  </div>
</body>
</html>
