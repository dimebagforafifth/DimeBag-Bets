<!-- @dsCard group="Type" viewport="700x130" name="Eyebrow & Label" subtitle="Uppercase, wide-tracked Barlow Semi Condensed for kickers + field labels" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-body); color: var(--text); padding: 24px; display: flex; gap: 48px; align-items: center; }
  .eyebrow { font-family: var(--font-head); font-size: 12px; font-weight: 600; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--gold); }
  .label { font-family: var(--font-label); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); }
  .big { font-family: var(--font-head); font-size: 30px; font-weight: 700; letter-spacing: var(--tracking-tight); margin-top: 4px; }
  .val { font-family: var(--font-num); font-size: 22px; font-weight: 700; margin-top: 2px; }
</style>
</head>
<body>
  <div>
    <div class="eyebrow">Provably fair · points only</div>
    <div class="big">The floor is open</div>
  </div>
  <div>
    <div class="label">Available</div>
    <div class="val" style="color: var(--gold-bright)">$8,420</div>
  </div>
  <div>
    <div class="label">This week</div>
    <div class="val" style="color: var(--green)">▲ $312</div>
  </div>
</body>
</html>
