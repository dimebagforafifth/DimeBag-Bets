<!-- @dsCard group="Colors" viewport="700x150" name="Stadium Gold" subtitle="The one confident accent — brand, primary actions, treasure" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-body); }
  .wrap { display: flex; gap: 12px; padding: 20px; align-items: stretch; }
  .sw { flex: 1; height: 110px; border-radius: var(--radius-sm); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-shadow: var(--sheen); }
  .name { font-family: var(--font-label); font-size: 12px; font-weight: 600; color: var(--on-gold); letter-spacing: 0.04em; }
  .hex { font-family: var(--font-num); font-size: 11px; color: rgba(20,23,28,0.65); margin-top: 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw" style="background: var(--gold-press);"><span class="name">--gold-press</span><span class="hex">#D2A436</span></div>
    <div class="sw" style="background: var(--gold);"><span class="name">--gold</span><span class="hex">#F0BE4A</span></div>
    <div class="sw" style="background: var(--gold-bright);"><span class="name">--gold-bright</span><span class="hex">#F5C459</span></div>
  </div>
</body>
</html>
