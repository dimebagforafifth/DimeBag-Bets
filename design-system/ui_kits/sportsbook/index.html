<!-- @dsCard group="Sportsbook" viewport="1280x800" name="Sportsbook" subtitle="Nav + balance, league rail, event rows, and the docked points bet slip" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PlayStadium — Sportsbook</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  img { display: block; }

  .sb-header { position: sticky; top: 0; z-index: 20; background: color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .sb-header__inner { max-width: var(--content-max); margin: 0 auto; height: 64px; display: flex; align-items: center; gap: 24px; padding: 0 24px; }
  .sb-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .sb-brand img { height: 40px; width: auto; image-rendering: pixelated; }
  .sb-brand span { font-family: var(--font-display); font-size: 28px; color: var(--text); }
  .sb-nav { display: flex; gap: 4px; }
  .sb-nav a { font-size: var(--text-sm); font-weight: 600; color: var(--muted); text-decoration: none; padding: 8px 14px; border-radius: var(--radius-sm); transition: color var(--dur) ease, background var(--dur) ease; }
  .sb-nav a:hover { color: var(--text); }
  .sb-nav a.is-active { color: var(--gold); background: color-mix(in srgb, var(--gold) 10%, transparent); }
  .sb-header__right { margin-left: auto; }

  .sb-rail { max-width: var(--content-max); margin: 0 auto; padding: 16px 24px 0; display: flex; gap: 8px; overflow-x: auto; }
  .sb-rail__btn { flex: 0 0 auto; font-family: var(--font-label); font-size: var(--text-sm); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-pill); padding: 8px 16px; cursor: pointer; transition: color var(--dur) ease, border-color var(--dur) ease, background var(--dur) ease; }
  .sb-rail__btn:hover { color: var(--text); }
  .sb-rail__btn.is-active { color: var(--on-gold); background: var(--gold); border-color: var(--gold); }

  .sb-body { max-width: var(--content-max); margin: 0 auto; padding: 20px 24px 64px; display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
  .sb-list__head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
  .sb-list__head h1 { font-family: var(--font-head); text-transform: uppercase; letter-spacing: var(--tracking-caps); font-size: var(--text-2xl); font-weight: 700; margin: 0; }
  .sb-list__head h1 span { color: var(--faint); font-weight: 500; }
  .sb-list__count { font-family: var(--font-num); font-size: var(--text-sm); color: var(--faint); }
  .sb-rows { display: flex; flex-direction: column; gap: 10px; }
  .sb-slip { position: sticky; top: 84px; }

  .sb-toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--line); box-shadow: var(--elev-3); border-radius: var(--radius-pill); padding: 10px 18px; font-size: var(--text-sm); font-weight: 600; z-index: 60; animation: sb-rise var(--dur-slow) var(--ease-out); }
  @keyframes sb-rise { from { opacity: 0; transform: translate(-50%, 8px); } }

  @media (max-width: 900px) {
    .sb-body { grid-template-columns: 1fr; }
    .sb-slip { position: static; }
    .sb-nav { display: none; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="events.js"></script>
  <script type="text/babel" src="SportsbookApp.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<SportsbookApp />)
  </script>
</body>
</html>
