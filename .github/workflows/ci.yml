name: CI

# Verify every push to main and every pull request: typecheck, tests, and a real
# production build. CLAUDE.md §9 has two people working around the shared `core`
# via branches/PRs — this is the gate that keeps money/logic regressions out.
on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default: hand every job a read-only GITHUB_TOKEN. Jobs that need
# more (e.g. uploading scan results) opt in explicitly at the job level below.
permissions: read-all

# One in-flight run per branch/PR; a newer push cancels the older run so CI minutes
# aren't spent on superseded commits and the latest result lands sooner.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Third-party Actions are pinned to a full commit SHA (not a floating tag) so a
      # retagged or compromised release can't silently execute in CI. The trailing
      # comment records the human-readable version for Dependabot to bump.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      # npm ci installs exactly from package-lock.json (reproducible), unlike npm install.
      - run: npm ci
      # Supply-chain gate (merge-blocking): fail on any HIGH or CRITICAL advisory in
      # the installed dependency tree. Runs immediately after install so a vulnerable
      # dependency can never reach a merge. This is the primary, enforced audit gate;
      # the osv-scan job below is an additional, broader signal.
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # Cross-check the lockfile against the OSV.dev database (wider coverage than
  # `npm audit`) and surface results in the Security tab. NB: there is no official
  # `osv-scanner` npm package — the scanner is a Go binary — so `npx osv-scanner`
  # is NOT a safe install path (typosquat risk); the official reusable workflow is
  # the supported way to run it in CI. fail-on-vuln is false so `npm audit` stays
  # the enforced gate; flip it to true to make OSV findings merge-blocking too.
  osv-scan:
    name: OSV vulnerability scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --lockfile=package-lock.json
      fail-on-vuln: false

  # Validate every workflow file against GitHub's Actions schema: YAML syntax,
  # job/step shape, expression contexts, and action input names. shellcheck is
  # disabled so it doesn't flag the pre-existing deploy-pages.yml shell scripts
  # (preserved by this change); the workflow-schema checks are the point here.
  actionlint:
    name: Lint workflow files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          shellcheck: false
