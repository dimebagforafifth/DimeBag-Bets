name: Secret Scan

# gitleaks scans for committed secrets on every push and every pull request,
# blocking them before they merge. This is the standing guard behind the
# secrets-rotation checklist in SECURITY.md: real secrets live only in untracked
# .env.local / the deploy provider's secret store and must never enter the repo.
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so gitleaks can scan the whole commit range of the event,
          # not just a shallow tip.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo-specific allowlist / tuning (placeholders, lockfile hashes, test
          # seeds) lives in .gitleaks.toml at the repo root.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          # gitleaks-action is free for personal accounts and public repos. This is
          # a public repo owned by a personal account (dimebagforafifth), so no
          # GITLEAKS_LICENSE is required. (Organization repos need a license key.)
